services:
  postgres:
    image: postgres:16
    container_name: civic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: civic_service_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - civic_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: civic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  civic_postgres_data:
